<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Terrivox — Software de Gestión Ambiental para empresas en Ecuador. Cumplimiento normativo sin dolor de cabeza." />
  <title>Terrivox — Gestión Ambiental</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="login-screen">
    <div class="login-bg-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>
    <div class="login-card">
      <div class="login-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="24" fill="url(#logoGrad)"/>
          <path d="M24 12C17.4 12 12 17.4 12 24s5.4 12 12 12c2.2 0 4.2-.6 6-1.6C27.2 32.8 24 29.6 24 25.6V20c0-2.8 1.6-5.2 4-6.4C26.6 12.6 25.4 12 24 12z" fill="rgba(255,255,255,0.9)"/>
          <path d="M30 16c-3.2 0-5.6 2.4-5.6 5.6v5.6c0 3.2 2.4 5.6 5.6 5.6s5.6-2.4 5.6-5.6V21.6c0-3.2-2.4-5.6-5.6-5.6z" fill="rgba(255,255,255,0.6)"/>
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48">
              <stop offset="0%" stop-color="#10b981"/>
              <stop offset="100%" stop-color="#059669"/>
            </linearGradient>
          </defs>
        </svg>
        <h1>Terrivox</h1>
        <p class="login-subtitle">La voz de la tierra</p>
      </div>
      <form id="login-form" autocomplete="off">
        <div class="input-group">
          <label for="login-email">Correo electrónico</label>
          <input type="email" id="login-email" placeholder="usuario@empresa.com" value="admin@terrivox.com" />
        </div>
        <div class="input-group">
          <label for="login-password">Contraseña</label>
          <input type="password" id="login-password" placeholder="••••••••" value="demo1234" />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          <span>Iniciar Sesión</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
        <p class="login-footer">Prototipo de demostración — Terrivox v0.1</p>
      </form>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app-shell" class="app-shell hidden">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="24" fill="url(#logoGrad2)"/>
          <path d="M24 12C17.4 12 12 17.4 12 24s5.4 12 12 12c2.2 0 4.2-.6 6-1.6C27.2 32.8 24 29.6 24 25.6V20c0-2.8 1.6-5.2 4-6.4C26.6 12.6 25.4 12 24 12z" fill="rgba(255,255,255,0.9)"/>
          <path d="M30 16c-3.2 0-5.6 2.4-5.6 5.6v5.6c0 3.2 2.4 5.6 5.6 5.6s5.6-2.4 5.6-5.6V21.6c0-3.2-2.4-5.6-5.6-5.6z" fill="rgba(255,255,255,0.6)"/>
          <defs>
            <linearGradient id="logoGrad2" x1="0" y1="0" x2="48" y2="48">
              <stop offset="0%" stop-color="#10b981"/>
              <stop offset="100%" stop-color="#059669"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="sidebar-brand">Terrivox</span>
      </div>

      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-view="dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="#" class="nav-item" data-view="licencias">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span>Licencias</span>
        </a>
        <a href="#" class="nav-item" data-view="residuos">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          <span>Residuos</span>
        </a>
        <a href="#" class="nav-item" data-view="monitoreo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span>Monitoreo</span>
        </a>
        <a href="#" class="nav-item" data-view="alertas">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span>Alertas</span>
          <span class="nav-badge">5</span>
        </a>
        <a href="#" class="nav-item" data-view="reportes">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span>Reportes</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="user-avatar">AM</div>
          <div class="user-info">
            <span class="user-name">Ana Martínez</span>
            <span class="user-role">Gestora Ambiental</span>
          </div>
        </div>
        <button class="btn-icon" id="logout-btn" title="Cerrar sesión">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <!-- HEADER -->
      <header class="main-header">
        <div class="header-left">
          <button class="btn-icon mobile-menu-btn" id="menu-toggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h2 class="page-title" id="page-title">Dashboard</h2>
        </div>
        <div class="header-right">
          <div class="search-box">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Buscar..." />
          </div>
          <button class="btn-icon notification-btn" id="notification-bell">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="notification-dot"></span>
          </button>
          <div class="header-user">
            <div class="user-avatar small">AM</div>
          </div>
        </div>
      </header>

      <!-- CONTENT AREA -->
      <div class="content-area" id="content-area">
        <!-- Views will be rendered here by JS -->
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
